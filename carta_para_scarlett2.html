<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carta para Scarcita❤️</title>
<style>
body {
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
}

/* Sobre como botón visible */
#sobreBtn {
  width: 300px;
  height: 200px;
  background-color: red;
  color: white;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Carta */
#carta {
  display: none;
  background-color: white;
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  margin-top: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Corazones */
.corazon {
  position: absolute;
  font-size: 24px;
  animation: flotar 5s linear infinite;
}

@keyframes flotar {
  0% { transform: translateY(0) translateX(0); opacity:1; }
  100% { transform: translateY(-600px) translateX(50px) scale(1.5); opacity:0; }
}

/* Mensaje final */
#final {
  font-size: 22px;
  color: #ff4d6d;
  margin-top: 20px;
  text-shadow: 0 0 5px #fff, 0 0 10px #ff4d6d, 0 0 15px #ff4d6d;
}
</style>
</head>
<body>

<!-- Sobre -->
<button id="sobreBtn">Toca para abrir 🎁</button>

<!-- Carta -->
<div id="carta">
  <h1>Carta para Scarlett ❤️</h1>
  <p id="texto"></p>
  <p id="final"></p>
</div>

<script>
// Mensaje gigante completo
let mensaje = "Hola, quería ser de las primeras personas en decirte feliz cumpleaños, porque la verdad para mí hoy no es un día cualquiera, hoy nació una persona que con el tiempo se volvió muy importante para mí, y aunque tal vez para muchos solo sea una fecha más, para mí sí significa algo especial. La verdad no soy muy bueno para decir todo lo que siento con palabras, pero hoy quería intentarlo, porque me alegra mucho tenerte en mi vida, desde que llegaste muchas cosas se sienten diferentes, como más bonitas o más especiales, incluso los días normales se sienten mejor cuando puedo hablar contigo o simplemente saber que estás ahí. Hoy solo espero que tengas un día muy bonito, que sonrías mucho, que te consientan bastante, que recibas muchos abrazos y que todo te salga bien, porque de verdad te lo mereces. Ojalá este nuevo año de tu vida venga lleno de cosas buenas, de momentos felices, de sueños que se cumplan y de muchas razones para seguir sonriendo. También espero poder seguir estando contigo en más momentos, en más risas, en más pláticas, incluso en esos ratos donde solo estamos hablando de cualquier cosa, porque aunque parezcan cosas simples, para mí significan mucho más de lo que parece. Gracias por cada momento que me has regalado, por cada risa, por cada plática y por todo lo bonito que haces sentir cuando estoy contigo. Puede que a veces no encuentre las palabras exactas para decir lo que siento, pero quiero que sepas que para mí eres alguien muy especial, alguien que se volvió importante en mi vida sin darme cuenta, y que me gusta mucho poder compartir tiempo contigo, reír contigo y hablar contigo de cualquier cosa. También quiero que sepas que admiro muchas cosas de ti, tu forma de ser, tu manera de ver las cosas y la forma en que haces que los momentos se sientan más bonitos. De verdad espero que este nuevo año de tu vida esté lleno de cosas bonitas, que logres muchas de las cosas que quieres y que siempre tengas motivos para sonreír. También deseo que nunca te falten personas que te quieran de verdad, personas que te apoyen, que te hagan sentir valorada y que estén contigo en los momentos buenos y en los no tan buenos, porque alguien como tú merece tener muchas cosas bonitas en su vida. A veces me pongo a pensar en lo curioso que es todo, porque hay personas que llegan a tu vida sin que lo planees y poco a poco se vuelven alguien importante, alguien con quien te gusta hablar, alguien que logra sacarte una sonrisa incluso en días normales, y la verdad contigo me pasa algo así. Puede que no siempre lo diga o que a veces no encuentre la forma perfecta de expresarlo, pero valoro mucho poder hablar contigo, compartir momentos contigo y simplemente saber que estás ahí, porque incluso en las cosas pequeñas se nota cuando alguien es especial. Y aunque tal vez para ti algunas de esas cosas sean normales, para mí significan más de lo que imaginas, porque hay momentos simples que terminan siendo recuerdos bonitos, pláticas que se quedan en la memoria y risas que uno recuerda después. La verdad me alegra mucho haberte conocido y que de alguna manera nuestras vidas se hayan cruzado, porque desde entonces tengo a alguien con quien hablar, con quien reír y con quien compartir momentos que poco a poco se vuelven especiales. También quiero que sepas que siempre voy a desear que te vaya bien en todo lo que hagas, que logres lo que te propongas y que tengas muchas razones para sentirte orgullosa de la persona que eres, porque de verdad creo que tienes muchas cosas bonitas que te hacen especial. Y aunque a veces no lo diga mucho, quiero que sepas que te quiero muchísimo y que eres alguien muy importante para mí, me alegra mucho haberte conocido y poder compartir momentos contigo, porque hay personas que llegan a la vida de uno y simplemente la hacen un poquito mejor, y tú eres una de esas. Feliz cumpleaños Scarlett, de verdad espero que hoy sea un día muy especial para ti, que lo disfrutes mucho, que sonrías bastante y que este nuevo año de tu vida venga lleno de felicidad, momentos bonitos y muchas razones para seguir sonriendo. Te quiero muchísimo <3";

let i = 0;

// Función que escribe letra por letra
function escribir(){
  if(i < mensaje.length){
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribir,30);
  } else {
    document.getElementById("final").innerHTML = "🎉 Feliz cumpleaños Scarlett ❤️<br>Te quiero muchísimo 💌";
    for(let j=0;j<20;j++){
      crearCorazon();
    }
  }
}

// Crear corazones
function crearCorazon(){
  let c = document.createElement("div");
  c.classList.add("corazon");
  c.innerHTML = "❤️";
  c.style.left = Math.random()*100 + "%";
  c.style.fontSize = (20 + Math.random()*20) + "px";
  c.style.animationDuration = (4 + Math.random()*3) + "s";
  document.body.appendChild(c);
}

// Abrir sobre
document.getElementById("sobreBtn").addEventListener("click", function(){
  this.style.display = "none";
  document.getElementById("carta").style.display = "block";
  escribir();
});
</script>

</body>
</html>
